name: lint

# Lints the Go CLI (module lives in app/). Runs on every push and PR to master,
# and is reusable (workflow_call) so the release workflow can gate on it too.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: app
